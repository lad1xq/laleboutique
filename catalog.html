<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lale Boutique - Каталог</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.4;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #111;
        }
        .logo-img { height: 32px; width: auto; }
        .nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 32px;
            transition: opacity 0.2s;
        }
        .nav a:hover { opacity: 0.6; }
        /* Категории плитками */
        .categories-bar {
            background: white;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
            margin-top: 80px; /* отступ под фиксированную шапку */
        }
        .categories-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .category-tile {
            padding: 8px 24px;
            background: #f8f8f8;
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 30px;
        }
        .category-tile:hover {
            background: #111;
            color: white;
        }
        .category-tile.active {
            background: #111;
            color: white;
        }
        /* Двухколоночный макет */
        .catalog-layout {
            display: flex;
            gap: 60px;
            margin-top: 40px;
        }
        .products-grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 40px;
        }
        .product-card {
            cursor: pointer;
            transition: opacity 0.3s;
            text-align: center;
        }
        .product-card:hover { opacity: 0.8; }
        .product-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            margin-bottom: 15px;
        }
        .product-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .product-title { font-size: 0.85rem; margin: 5px 0; }
        .product-price { font-size: 0.85rem; color: #666; }
        .product-sizes {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
        }
        /* Детальная панель справа */
        .product-detail {
            flex: 1;
            position: sticky;
            top: 120px;
            align-self: start;
        }
        .detail-gallery {
            margin-bottom: 20px;
        }
        .detail-main-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            margin-bottom: 10px;
        }
        .detail-thumbnails {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .detail-thumb {
            width: 60px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .detail-thumb:hover { opacity: 1; }
        .detail-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin: 10px 0 5px;
        }
        .detail-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .detail-price {
            font-size: 1.2rem;
            margin: 15px 0;
        }
        .detail-description {
            margin: 15px 0;
            color: #444;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .detail-sizes, .detail-material, .detail-care {
            margin: 10px 0;
            font-size: 0.85rem;
            color: #555;
        }
        .size-buttons {
            display: flex;
            gap: 8px;
            margin: 10px 0 20px;
            flex-wrap: wrap;
        }
        .size-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .size-btn:hover {
            border-color: #111;
        }
        .instagram-order-btn {
            display: inline-block;
            background: #111;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            margin-top: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .instagram-order-btn:hover {
            opacity: 0.8;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }
        .delivery-info {
            font-size: 0.75rem;
            color: #888;
            margin-top: 20px;
        }
        @media (max-width: 900px) {
            .catalog-layout {
                flex-direction: column;
            }
            .product-detail {
                position: static;
                margin-top: 40px;
            }
            .container {
                padding: 0 20px;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 25px;
            }
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <a href="index.html" class="logo" id="logo-container">LALE BOUTIQUE</a>
        <div class="nav">
            <a href="index.html">HOME</a>
            <a href="catalog.html">SHOP</a>
            <a href="index.html#contacts">CONTACT</a>
        </div>
    </div>
</header>

<!-- Блок категорий плитками -->
<div class="categories-bar">
    <div class="container">
        <div class="categories-grid" id="categories-grid"></div>
    </div>
</div>

<main>
    <div class="container">
        <div class="catalog-layout">
            <!-- Левая колонка: сетка товаров -->
            <div class="products-grid" id="products-grid"></div>
            <!-- Правая колонка: детали выбранного товара -->
            <div class="product-detail" id="product-detail">
                <div style="text-align: center; color: #888;">Выберите товар</div>
            </div>
        </div>
    </div>
</main>
<footer><div class="container">LALE BOUTIQUE © 2025</div></footer>

<script>
    // ----- ТОВАРЫ (полная база) -----
    const products = [
        { id:1, name:"Платье с цветочным принтом", brand:"Lale", price:"5 900 ₽", category:"Платья", sizes:["XS","S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+1"], description:"Элегантное платье-футляр с цветочным принтом. Подчеркнёт силуэт и добавит женственности.", material:"95% хлопок, 5% эластан", care:"Деликатная стирка при 30°", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:2, name:"Платье миди с открытой спиной", brand:"Lale", price:"7 200 ₽", category:"Платья", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+2"], description:"Платье миди с изящным вырезом на спине. Идеально для летних вечеров.", material:"100% вискоза", care:"Ручная стирка, не отбеливать", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:3, name:"Шелковое платье макси", brand:"Mila Grace", price:"12 500 ₽", category:"Платья", sizes:["XS","S","M"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+3"], description:"Роскошное платье макси из натурального шелка. Струящийся крой и элегантность.", material:"100% шелк", care:"Химчистка", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:4, name:"Комбинезон с поясом", brand:"Verona", price:"8 900 ₽", category:"Комбинезоны", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+1"], description:"Стильный комбинезон с поясом. Подходит для офиса и повседневной жизни.", material:"65% полиэстер, 35% хлопок", care:"Машинная стирка 40°", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:5, name:"Льняной комбинезон", brand:"Lale", price:"7 500 ₽", category:"Комбинезоны", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+2"], description:"Легкий льняной комбинезон для жарких дней.", material:"100% лен", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:6, name:"Кожаная юбка-карандаш", brand:"Mila Grace", price:"6 900 ₽", category:"Юбки", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+1"], description:"Эко-кожаная юбка-карандаш. Универсальная база.", material:"100% полиуретан", care:"Влажная чистка", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:7, name:"Плиссированная юбка миди", brand:"Verona", price:"5 500 ₽", category:"Юбки", sizes:["XS","S","M"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+2"], description:"Легкая плиссированная юбка миди.", material:"100% полиэстер", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" },
        { id:8, name:"Шелковая блуза", brand:"Mila Grace", price:"7 800 ₽", category:"Блузы", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Blouse+1"], description:"Атласная блуза с шелковистым блеском.", material:"100% полиэстер", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/", modelHeight:"175 см", madeIn:"Италия" }
    ];

    // Получаем все категории
    const categories = [...new Set(products.map(p => p.category))];

    // Получаем параметр category из URL
    const urlParams = new URLSearchParams(window.location.search);
    let activeCategory = urlParams.get('category');
    if (!activeCategory || !categories.includes(activeCategory)) {
        activeCategory = categories[0]; // по умолчанию первая категория
    }

    // Рендер плиток категорий
    function renderCategoryTiles() {
        const container = document.getElementById('categories-grid');
        container.innerHTML = categories.map(cat => `
            <a href="?category=${encodeURIComponent(cat)}" class="category-tile ${cat === activeCategory ? 'active' : ''}">
                ${cat}
            </a>
        `).join('');
    }

    // Рендер товаров выбранной категории
    function renderProducts() {
        const filtered = products.filter(p => p.category === activeCategory);
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';
        if (filtered.length === 0) {
            grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Нет товаров в этой категории</p>';
            return;
        }
        filtered.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-id', product.id);
            card.innerHTML = `
                <img class="product-img" src="${product.images[0]}" alt="${product.name}">
                <div class="product-brand">${product.brand}</div>
                <div class="product-title">${product.name}</div>
                <div class="product-price">${product.price}</div>
                <div class="product-sizes">${product.sizes.join(', ')}</div>
            `;
            card.addEventListener('click', () => showProductDetail(product.id));
            grid.appendChild(card);
        });
        // Показать первый товар по умолчанию
        if (filtered.length > 0) {
            showProductDetail(filtered[0].id);
        }
    }

    // Функция отображения деталей товара
    function showProductDetail(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        const detailDiv = document.getElementById('product-detail');
        // Генерируем миниатюры
        let thumbnailsHtml = '';
        if (product.images && product.images.length > 1) {
            thumbnailsHtml = `<div class="detail-thumbnails">${product.images.map(img => `<img class="detail-thumb" src="${img}" alt="thumbnail">`).join('')}</div>`;
        }
        // Кнопки размеров
        const sizeButtonsHtml = product.sizes.map(size => `<button class="size-btn">${size}</button>`).join('');
        detailDiv.innerHTML = `
            <div class="detail-gallery">
                <img class="detail-main-img" id="detail-main-img" src="${product.images[0]}" alt="${product.name}">
                ${thumbnailsHtml}
            </div>
            <div class="detail-brand">${product.brand}</div>
            <div class="detail-title">${product.name}</div>
            <div class="detail-price">${product.price}</div>
            <div class="detail-description">${product.description}</div>
            <div class="detail-material"><strong>Материал:</strong> ${product.material}</div>
            <div class="detail-sizes"><strong>Размеры:</strong></div>
            <div class="size-buttons">${sizeButtonsHtml}</div>
            <div class="detail-care"><strong>Уход:</strong> ${product.care}</div>
            <a href="${product.instagramLink}" target="_blank" class="instagram-order-btn">ЗАКАЗАТЬ В INSTAGRAM</a>
            <hr>
            <div class="delivery-info">
                <strong>Ожидаемая доставка:</strong> 3–5 дней<br>
                <strong>Сделано в:</strong> ${product.madeIn || 'Италия'}<br>
                <strong>Модель на фото:</strong> ${product.modelHeight || '175 см'}, размер ${product.sizes[1] || 'S'}
            </div>
        `;
        // Обработка кликов на миниатюры
        const mainImg = document.getElementById('detail-main-img');
        const thumbs = document.querySelectorAll('.detail-thumb');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', () => {
                mainImg.src = thumb.src;
            });
        });
        // Подсветка выбранного товара в сетке
        document.querySelectorAll('.product-card').forEach(card => {
            if (parseInt(card.dataset.id) === productId) {
                card.style.opacity = '0.8';
            } else {
                card.style.opacity = '1';
            }
        });
    }

    // Инициализация
    renderCategoryTiles();
    renderProducts();
</script>
</body>
</html>
