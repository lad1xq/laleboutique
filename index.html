<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lale Boutique - Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.4;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #B8860B; /* золотой */
            transition: color 0.3s;
        }
        .logo:hover { color: #8B0000; } /* тёмно-красный */
        .nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 32px;
            transition: color 0.3s ease;
        }
        .nav a:hover { color: #B8860B; }
        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f8f8f8;
            position: relative;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }
        .hero-content { animation: slideUp 1s ease-out 0.2s forwards; opacity: 0; transform: translateY(30px); }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-logo {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #B8860B;
            text-transform: uppercase;
        }
        .hero-description {
            font-size: 0.9rem;
            max-width: 500px;
            margin: 0 auto;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            cursor: pointer;
        }
        @keyframes bounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        /* Sections */
        section {
            padding: 100px 0;
            border-bottom: 1px solid #f0f0f0;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            background: #fff;
        }
        section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 400;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 60px;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            padding-bottom: 15px;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: #B8860B;
        }
        /* Carousel */
        .carousel {
            position: relative;
            overflow: hidden;
            padding: 0 40px;
        }
        .carousel-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding-bottom: 20px;
            transition: scroll-behavior 0.3s;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-item {
            flex: 0 0 280px;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
            text-decoration: none;
            color: #111;
        }
        .carousel-item:hover {
            opacity: 0.9;
            transform: translateY(-5px);
        }
        .carousel-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .carousel-info { text-align: center; }
        .carousel-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .carousel-title { font-size: 0.85rem; margin: 5px 0; font-weight: 500; }
        .carousel-price { font-size: 0.85rem; color: #B8860B; }
        .carousel-sizes {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }
        .carousel-nav {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            opacity: 0.7;
        }
        .carousel-nav:hover {
            background: #B8860B;
            color: white;
            border-color: #B8860B;
            opacity: 1;
        }
        .carousel-nav.prev { left: 0; }
        .carousel-nav.next { right: 0; }
        /* Кнопка каталога */
        .catalog-btn {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            background: none;
            border: 1px solid #111;
            color: #111;
            padding: 12px 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .catalog-btn:hover {
            background: #B8860B;
            border-color: #B8860B;
            color: white;
            transform: scale(1.02);
        }
        /* Контакты */
        .contacts-block {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .contacts-block p { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .instagram-link {
            display: inline-block;
            margin-top: 20px;
            color: #B8860B;
            text-decoration: none;
            border-bottom: 1px solid #B8860B;
            padding-bottom: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        .instagram-link:hover { opacity: 0.7; color: #8B0000; border-color: #8B0000; }
        .map {
            margin-top: 40px;
            height: 250px;
            background: #f5f5f5;
            border-radius: 4px;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .map iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid #f0f0f0;
        }
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .hero-logo { font-size: 2rem; }
            .section-title { font-size: 1.4rem; margin-bottom: 40px; }
            .carousel { padding: 0 20px; }
            .carousel-item { flex: 0 0 240px; }
        }
        /* Модалка (оставлена, но на главной не используется) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
        }
        .modal-content {
            background: white;
            max-width: 1100px;
            width: 90%;
            margin: 40px auto;
            position: relative;
            padding: 30px;
            border-radius: 0;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }
        .close-modal:hover { color: #111; }
        .modal-product { display: flex; flex-wrap: wrap; gap: 40px; }
        .modal-gallery { flex: 1; min-width: 280px; }
        .modal-main-img { width: 100%; margin-bottom: 15px; }
        .modal-thumbnails { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-thumb { width: 70px; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
        .modal-thumb:hover { opacity: 1; }
        .modal-info { flex: 1; min-width: 280px; }
        .modal-info h2 { font-size: 1.5rem; font-weight: 400; margin-bottom: 10px; }
        .modal-brand { font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 15px; }
        .modal-price { font-size: 1.2rem; margin: 20px 0; }
        .modal-direct {
            display: inline-block;
            background: #111;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            margin-top: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .modal-direct:hover { background: #B8860B; }
    </style>
</head>
<body>
<header id="header">
    <div class="container header-inner">
        <div class="logo">LALE BOUTIQUE</div>
        <div class="nav">
            <a href="#home">HOME</a>
            <a href="catalog.html">SHOP</a>
            <a href="#contacts">CONTACT</a>
        </div>
    </div>
</header>

<main>
    <section id="home" class="hero">
        <div class="hero-content">
            <div class="hero-logo">LALE BOUTIQUE</div>
            <p class="hero-description">МУЛЬТИБРЕНДОВЫЙ ШОУРУМ<br>ЖЕНСКАЯ ОДЕЖДА</p>
        </div>
        <div class="scroll-hint" onclick="document.getElementById('new').scrollIntoView({behavior:'smooth'})"><span></span></div>
    </section>

    <section id="new">
        <div class="container">
            <h2 class="section-title">НОВИНКИ</h2>
            <div class="carousel">
                <div class="carousel-container" id="new-items"></div>
                <div class="carousel-nav prev" onclick="scrollCarousel('new-items', -1)">←</div>
                <div class="carousel-nav next" onclick="scrollCarousel('new-items', 1)">→</div>
            </div>
        </div>
    </section>

    <section>
        <div class="container">
            <h2 class="section-title">ХИТЫ</h2>
            <div class="carousel">
                <div class="carousel-container" id="popular-items"></div>
                <div class="carousel-nav prev" onclick="scrollCarousel('popular-items', -1)">←</div>
                <div class="carousel-nav next" onclick="scrollCarousel('popular-items', 1)">→</div>
            </div>
        </div>
    </section>

    <section>
        <div class="container" style="text-align:center">
            <a href="catalog.html" class="catalog-btn">ВЕСЬ КАТАЛОГ</a>
        </div>
    </section>

    <section id="contacts">
        <div class="container">
            <div class="contacts-block">
                <p>ул. Дзержинского, 8/1, Махачкала</p>
                <p>Ежедневно 11:00 – 20:00</p>
                <a href="https://www.instagram.com/lale_boutique05" target="_blank" class="instagram-link">@lale_boutique05</a>
                <div class="map">
                    <iframe src="https://yandex.ru/map-widget/v1/?oid=92141361734&ol=biz&z=18&pt=47.500405,42.981792,pm2rdm" width="100%" height="250" frameborder="0" allowfullscreen="true"></iframe>
                </div>
            </div>
        </div>
    </section>
</main>
<footer>
    <div class="container">LALE BOUTIQUE © 2025</div>
</footer>

<div id="productModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><div id="modal-body"></div></div></div>

<script>
    const products = [
        { id:1, name:"Платье с цветочным принтом", brand:"Lale", price:"5 900 ₽", category:"Платья", isNew:true, isPopular:true, sizes:"XS, S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+1"], description:"Элегантное платье-футляр", material:"95% хлопок, 5% эластан", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:2, name:"Платье миди с открытой спиной", brand:"Lale", price:"7 200 ₽", category:"Платья", isNew:true, isPopular:false, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+2"], description:"Платье с открытой спиной", material:"Вискоза 100%", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:3, name:"Шелковое платье макси", brand:"Mila Grace", price:"12 500 ₽", category:"Платья", isNew:false, isPopular:true, sizes:"XS, S, M", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+3"], description:"Шелковое платье макси", material:"Натуральный шелк", care:"Химчистка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:4, name:"Комбинезон с поясом", brand:"Verona", price:"8 900 ₽", category:"Комбинезоны", isNew:true, isPopular:false, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+1"], description:"Стильный комбинезон", material:"Полиэстер 65%, хлопок 35%", care:"Машинная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:5, name:"Льняной комбинезон", brand:"Lale", price:"7 500 ₽", category:"Комбинезоны", isNew:false, isPopular:true, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+2"], description:"Льняной комбинезон", material:"Лен 100%", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:6, name:"Кожаная юбка-карандаш", brand:"Mila Grace", price:"6 900 ₽", category:"Юбки", isNew:false, isPopular:true, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+1"], description:"Эко-кожа", material:"Полиуретан", care:"Влажная чистка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:7, name:"Плиссированная юбка миди", brand:"Verona", price:"5 500 ₽", category:"Юбки", isNew:true, isPopular:false, sizes:"XS, S, M", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+2"], description:"Плиссированная юбка", material:"Полиэстер 100%", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:8, name:"Шелковая блуза", brand:"Mila Grace", price:"7 800 ₽", category:"Блузы", isNew:false, isPopular:true, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Blouse+1"], description:"Атласная блуза", material:"Полиэстер 100%", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" }
    ];

    function renderCarousel(containerId, items) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = items.map(p => `
            <div class="carousel-item" data-id="${p.id}">
                <img class="carousel-img" src="${p.images[0]}">
                <div class="carousel-info">
                    <div class="carousel-brand">${p.brand}</div>
                    <div class="carousel-title">${p.name}</div>
                    <div class="carousel-price">${p.price}</div>
                    <div class="carousel-sizes">${p.sizes}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll(`#${containerId} .carousel-item`).forEach(el => el.addEventListener('click', () => openModal(parseInt(el.dataset.id))));
    }

    function openModal(id) {
        const p = products.find(p=>p.id===id);
        if(!p) return;
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `<div class="modal-product"><div class="modal-gallery"><img class="modal-main-img" id="modal-main-img" src="${p.images[0]}"><div class="modal-thumbnails">${p.images.map(img=>`<img class="modal-thumb" src="${img}">`).join('')}</div></div><div class="modal-info"><h2>${p.name}</h2><div class="modal-brand">${p.brand}</div><div class="modal-price">${p.price}</div><div class="modal-desc">${p.description}</div><div><strong>Материал:</strong> ${p.material}</div><div><strong>Размеры:</strong> ${p.sizes}</div><div><strong>Уход:</strong> ${p.care}</div><a href="${p.instagramLink}" target="_blank" class="modal-direct">ЗАКАЗАТЬ В INSTAGRAM</a></div></div>`;
        const mainImg = document.getElementById('modal-main-img');
        document.querySelectorAll('.modal-thumb').forEach(thumb => thumb.addEventListener('click', () => mainImg.src = thumb.src));
        document.getElementById('productModal').style.display = 'flex';
    }

    function scrollCarousel(containerId, dir) {
        const c = document.getElementById(containerId);
        if(c) c.scrollLeft += dir * 320;
    }

    document.querySelector('.close-modal')?.addEventListener('click', () => document.getElementById('productModal').style.display = 'none');
    window.addEventListener('click', e => { if(e.target === document.getElementById('productModal')) document.getElementById('productModal').style.display = 'none'; });

    renderCarousel('new-items', products.filter(p=>p.isNew));
    renderCarousel('popular-items', products.filter(p=>p.isPopular));

    const sections = document.querySelectorAll('section');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });
    sections.forEach(section => observer.observe(section));
    sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) section.classList.add('visible');
    });
</script>
</body>
</html>
