<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lale Boutique - Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.4;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
        .logo-img { height: 32px; width: auto; }
        .nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 32px;
            transition: opacity 0.2s;
        }
        .nav a:hover { opacity: 0.6; }
        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f8f8f8;
            position: relative;
        }
        .hero-content { animation: fadeUp 1.2s ease-out; }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .hero-logo { font-size: 3.5rem; font-weight: 400; letter-spacing: 4px; margin-bottom: 20px; }
        .hero-logo-img { max-width: 280px; height: auto; }
        .hero-description {
            font-size: 0.9rem;
            max-width: 500px;
            margin: 0 auto;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            cursor: pointer;
        }
        @keyframes bounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        /* Sections */
        section { padding: 100px 0; border-bottom: 1px solid #f0f0f0; }
        .section-title {
            font-size: 1.8rem;
            font-weight: 400;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        /* Carousel */
        .carousel {
            position: relative;
            overflow: hidden;
            padding: 0 40px;
        }
        .carousel-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding-bottom: 20px;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-item {
            flex: 0 0 300px;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
            color: #111;
        }
        .carousel-item:hover { opacity: 0.8; }
        .carousel-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            margin-bottom: 15px;
        }
        .carousel-info { text-align: center; }
        .carousel-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .carousel-title { font-size: 0.85rem; margin: 5px 0; }
        .carousel-price { font-size: 0.85rem; color: #666; }
        .carousel-nav {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }
        .carousel-nav:hover { background: #111; color: white; border-color: #111; }
        .carousel-nav.prev { left: 0; }
        .carousel-nav.next { right: 0; }
        /* Кнопка каталога */
        .catalog-btn {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            background: none;
            border: 1px solid #111;
            color: #111;
            padding: 12px 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .catalog-btn:hover { background: #111; color: white; }
        /* Контакты */
        .contacts-block {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .contacts-block p { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .instagram-link {
            display: inline-block;
            margin-top: 20px;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid #111;
            padding-bottom: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .map {
            margin-top: 40px;
            height: 200px;
            background: #f5f5f5;
            border-radius: 4px;
            overflow: hidden;
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .hero-logo { font-size: 2rem; }
            .section-title { font-size: 1.4rem; margin-bottom: 40px; }
            .carousel { padding: 0 20px; }
            .carousel-item { flex: 0 0 240px; }
        }
        /* Модалка (та же) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 1100px;
            width: 90%;
            margin: 40px auto;
            position: relative;
            padding: 30px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
        }
        .modal-product { display: flex; flex-wrap: wrap; gap: 40px; }
        .modal-gallery { flex: 1; min-width: 280px; }
        .modal-main-img { width: 100%; margin-bottom: 15px; }
        .modal-thumbnails { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-thumb { width: 70px; cursor: pointer; opacity: 0.6; }
        .modal-thumb:hover { opacity: 1; }
        .modal-info { flex: 1; min-width: 280px; }
        .modal-info h2 { font-size: 1.5rem; font-weight: 400; margin-bottom: 10px; }
        .modal-brand { font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 15px; }
        .modal-price { font-size: 1.2rem; margin: 20px 0; }
        .modal-direct {
            display: inline-block;
            background: #111;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            margin-top: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <div class="logo" id="logo-container">LALE BOUTIQUE</div>
        <div class="nav">
            <a href="#home">HOME</a>
            <a href="catalog.html">SHOP</a>
            <a href="#contacts">CONTACT</a>
        </div>
    </div>
</header>

<main>
    <section id="home" class="hero">
        <div class="hero-content">
            <div id="hero-logo"><div class="hero-logo">LALE BOUTIQUE</div></div>
            <p class="hero-description">MULTIBRAND SHOWROOM<br>WOMEN'S READY-TO-WEAR</p>
        </div>
        <div class="scroll-hint" onclick="document.getElementById('new').scrollIntoView({behavior:'smooth'})"><span></span></div>
    </section>

    <section id="new">
        <div class="container">
            <h2 class="section-title">NEW ARRIVALS</h2>
            <div class="carousel"><div class="carousel-container" id="new-items"></div><div class="carousel-nav prev" onclick="scrollCarousel('new-items',-1)">←</div><div class="carousel-nav next" onclick="scrollCarousel('new-items',1)">→</div></div>
        </div>
    </section>

    <section>
        <div class="container">
            <h2 class="section-title">BESTSELLERS</h2>
            <div class="carousel"><div class="carousel-container" id="popular-items"></div><div class="carousel-nav prev" onclick="scrollCarousel('popular-items',-1)">←</div><div class="carousel-nav next" onclick="scrollCarousel('popular-items',1)">→</div></div>
        </div>
    </section>

    <section>
        <div class="container" style="text-align:center">
            <a href="catalog.html" class="catalog-btn">VIEW FULL CATALOG</a>
        </div>
    </section>

    <section id="contacts">
        <div class="container">
            <div class="contacts-block">
                <p>Dzerzhinskogo St, 6</p>
                <p>Daily 11:00 – 20:00</p>
                <a href="https://www.instagram.com/lale_boutique05" target="_blank" class="instagram-link">@lale_boutique05</a>
                <div class="map"><iframe src="https://yandex.ru/map-widget/v1/?um=constructor%3A1234567890abcdef&source=constructor" allowfullscreen></iframe></div>
            </div>
        </div>
    </section>
</main>
<footer><div class="container">LALE BOUTIQUE © 2025</div></footer>

<div id="productModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><div id="modal-body"></div></div></div>

<script>
    // Товары (те же, что и в каталоге)
    const products = [
        { id:1, name:"Flower Print Dress", brand:"Lale", price:"€159", category:"Dresses", isNew:true, isPopular:true, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+1"], description:"Elegant fitted dress", material:"95% Cotton", sizes:"XS,S,M,L", care:"Gentle wash", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:2, name:"Open Back Midi", brand:"Lale", price:"€195", category:"Dresses", isNew:true, isPopular:false, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+2"], description:"Open back midi", material:"Viscose", sizes:"S,M,L", care:"Hand wash", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:3, name:"Silk Maxi", brand:"Mila Grace", price:"€345", category:"Dresses", isNew:false, isPopular:true, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+3"], description:"Silk maxi dress", material:"Silk", sizes:"XS,S,M", care:"Dry clean", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:4, name:"Belted Jumpsuit", brand:"Verona", price:"€245", category:"Jumpsuits", isNew:true, isPopular:false, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+1"], description:"Belted jumpsuit", material:"Polyester/Cotton", sizes:"S,M,L", care:"Machine wash", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:5, name:"Linen Jumpsuit", brand:"Lale", price:"€205", category:"Jumpsuits", isNew:false, isPopular:true, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+2"], description:"Linen jumpsuit", material:"Linen", sizes:"S,M,L", care:"Gentle", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:6, name:"Leather Pencil Skirt", brand:"Mila Grace", price:"€189", category:"Skirts", isNew:false, isPopular:true, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+1"], description:"Eco leather skirt", material:"Polyurethane", sizes:"S,M,L", care:"Wipe", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:7, name:"Pleated Midi Skirt", brand:"Verona", price:"€149", category:"Skirts", isNew:true, isPopular:false, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+2"], description:"Pleated skirt", material:"Polyester", sizes:"XS,S,M", care:"Gentle", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:8, name:"Silk Blouse", brand:"Mila Grace", price:"€215", category:"Blouses", isNew:false, isPopular:true, images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Blouse+1"], description:"Silk blouse", material:"Polyester", sizes:"S,M,L", care:"Hand wash", instagramLink:"https://www.instagram.com/lale_boutique05/" }
    ];

    function renderCarousel(containerId, items) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = items.map(p => `<div class="carousel-item" data-id="${p.id}"><img class="carousel-img" src="${p.images[0]}"><div class="carousel-info"><div class="carousel-brand">${p.brand}</div><div class="carousel-title">${p.name}</div><div class="carousel-price">${p.price}</div></div></div>`).join('');
        document.querySelectorAll(`#${containerId} .carousel-item`).forEach(el => el.addEventListener('click', () => openModal(parseInt(el.dataset.id))));
    }

    function openModal(id) {
        const p = products.find(p=>p.id===id);
        if(!p) return;
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `<div class="modal-product"><div class="modal-gallery"><img class="modal-main-img" id="modal-main-img" src="${p.images[0]}"><div class="modal-thumbnails">${p.images.map(img=>`<img class="modal-thumb" src="${img}">`).join('')}</div></div><div class="modal-info"><h2>${p.name}</h2><div class="modal-brand">${p.brand}</div><div class="modal-price">${p.price}</div><div class="modal-desc">${p.description}</div><div><strong>Material:</strong> ${p.material}</div><div><strong>Sizes:</strong> ${p.sizes}</div><div><strong>Care:</strong> ${p.care}</div><a href="${p.instagramLink}" target="_blank" class="modal-direct">ORDER VIA INSTAGRAM DM</a></div></div>`;
        const mainImg = document.getElementById('modal-main-img');
        document.querySelectorAll('.modal-thumb').forEach(thumb => thumb.addEventListener('click', () => mainImg.src = thumb.src));
        document.getElementById('productModal').style.display = 'flex';
    }

    function scrollCarousel(containerId, dir) {
        const c = document.getElementById(containerId);
        if(c) c.scrollLeft += dir * 320;
    }

    document.querySelector('.close-modal')?.addEventListener('click', () => document.getElementById('productModal').style.display = 'none');
    window.addEventListener('click', e => { if(e.target === document.getElementById('productModal')) document.getElementById('productModal').style.display = 'none'; });

    renderCarousel('new-items', products.filter(p=>p.isNew));
    renderCarousel('popular-items', products.filter(p=>p.isPopular));

    window.addLogo = (url) => {
        document.getElementById('logo-container').innerHTML = `<img src="${url}" class="logo-img">`;
        document.getElementById('hero-logo').innerHTML = `<img src="${url}" class="hero-logo-img">`;
    };
</script>
</body>
</html>
