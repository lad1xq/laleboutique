<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lale Boutique - Каталог</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.4;
            background-image: url('watermark.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: 30%;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 1; }
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo img { height: 40px; width: auto; display: block; }
        .nav a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 32px;
            transition: opacity 0.2s;
        }
        .nav a:hover { opacity: 0.6; }
        main { padding-top: 100px; }
        .categories-bar {
            background: rgba(255,255,255,0.95);
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .categories-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .category-tile {
            padding: 8px 24px;
            background: #f8f8f8;
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 30px;
            cursor: pointer;
        }
        .category-tile:hover, .category-tile.active {
            background: #111;
            color: white;
        }
        .filter-bar {
            background: rgba(255,255,255,0.95);
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: space-between;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            border-radius: 30px;
            outline: none;
        }
        .price-filter {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .price-filter input {
            width: 90px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
            text-align: center;
        }
        .size-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .size-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
        }
        .reset-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: #f0f0f0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }
        .product-card {
            cursor: pointer;
            transition: opacity 0.3s;
            text-align: center;
        }
        .product-card:hover { opacity: 0.8; }
        .product-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            margin-bottom: 15px;
        }
        .product-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .product-title { font-size: 0.85rem; margin: 5px 0; }
        .product-price { font-size: 0.85rem; color: #666; }
        .product-sizes {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 40px;
            background: rgba(255,255,255,0.95);
        }
        footer img {
            height: 30px;
            margin-bottom: 10px;
            opacity: 0.6;
        }
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .products-grid { gap: 25px; }
            .filter-row { flex-direction: column; align-items: stretch; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            overflow-y: auto;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 1100px;
            width: 90%;
            margin: 40px auto;
            border-radius: 0;
            position: relative;
            padding: 30px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
        }
        .close-modal:hover { color: #111; }
        .modal-product {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }
        .modal-gallery { flex: 1; min-width: 280px; }
        .modal-main-img { width: 100%; margin-bottom: 15px; }
        .modal-thumbnails { display: flex; gap: 10px; flex-wrap: wrap; }
        .modal-thumb { width: 70px; cursor: pointer; opacity: 0.6; }
        .modal-thumb:hover { opacity: 1; }
        .modal-info { flex: 1; min-width: 280px; }
        .modal-info h2 { font-size: 1.5rem; font-weight: 400; margin-bottom: 10px; }
        .modal-brand { font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 15px; }
        .modal-price { font-size: 1.2rem; margin: 20px 0; }
        .modal-direct {
            display: inline-block;
            background: #111;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            margin-top: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="logo-header.png" alt="Lale Boutique">
        </a>
        <div class="nav">
            <a href="index.html">HOME</a>
            <a href="catalog.html">SHOP</a>
            <a href="index.html#contacts">CONTACT</a>
        </div>
    </div>
</header>

<div class="categories-bar">
    <div class="container">
        <div class="categories-grid" id="categories-grid"></div>
    </div>
</div>

<div class="filter-bar">
    <div class="container">
        <div class="filter-row">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск по названию...">
            </div>
            <div class="filter-group">
                <div class="price-filter">
                    <span>Цена (₽):</span>
                    <input type="number" id="price-min" placeholder="от" value="0">
                    <input type="number" id="price-max" placeholder="до" value="20000">
                </div>
                <div class="size-filter" id="size-filter-container"></div>
                <button id="reset-filters" class="reset-btn">Сбросить</button>
            </div>
        </div>
    </div>
</div>

<main>
    <div class="container">
        <div class="products-grid" id="products-grid"></div>
    </div>
</main>

<footer>
    <div class="container">
        <img src="logo-footer.png" alt="Lale Boutique" style="height: 30px; opacity: 0.6; margin-bottom: 10px;">
        <div>LALE BOUTIQUE © 2025</div>
    </div>
</footer>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const products = [
        { id:1, name:"Платье с цветочным принтом", brand:"Lale", price:5900, priceStr:"5 900 ₽", category:"Платья", sizes:["XS","S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+1"], description:"Элегантное платье-футляр", material:"95% хлопок, 5% эластан", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:2, name:"Платье миди с открытой спиной", brand:"Lale", price:7200, priceStr:"7 200 ₽", category:"Платья", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+2"], description:"Платье с открытой спиной", material:"Вискоза 100%", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:3, name:"Шелковое платье макси", brand:"Mila Grace", price:12500, priceStr:"12 500 ₽", category:"Платья", sizes:["XS","S","M"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+3"], description:"Шелковое платье макси", material:"Натуральный шелк", care:"Химчистка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:4, name:"Комбинезон с поясом", brand:"Verona", price:8900, priceStr:"8 900 ₽", category:"Комбинезоны", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+1"], description:"Стильный комбинезон", material:"Полиэстер 65%, хлопок 35%", care:"Машинная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:5, name:"Льняной комбинезон", brand:"Lale", price:7500, priceStr:"7 500 ₽", category:"Комбинезоны", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+2"], description:"Льняной комбинезон", material:"Лен 100%", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:6, name:"Кожаная юбка-карандаш", brand:"Mila Grace", price:6900, priceStr:"6 900 ₽", category:"Юбки", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+1"], description:"Эко-кожа", material:"Полиуретан", care:"Влажная чистка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:7, name:"Плиссированная юбка миди", brand:"Verona", price:5500, priceStr:"5 500 ₽", category:"Юбки", sizes:["XS","S","M"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+2"], description:"Плиссированная юбка", material:"Полиэстер 100%", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:8, name:"Шелковая блуза", brand:"Mila Grace", price:7800, priceStr:"7 800 ₽", category:"Блузы", sizes:["S","M","L"], images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Blouse+1"], description:"Атласная блуза", material:"Полиэстер 100%", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" }
    ];

    const categories = [...new Set(products.map(p => p.category))];
    const allSizes = [...new Set(products.flatMap(p => p.sizes))].sort();

    let activeCategory = categories[0];
    let searchQuery = '';
    let minPrice = 0;
    let maxPrice = 20000;
    let selectedSizes = [];

    const categoriesGrid = document.getElementById('categories-grid');
    const productsGrid = document.getElementById('products-grid');
    const searchInput = document.getElementById('search-input');
    const priceMinInput = document.getElementById('price-min');
    const priceMaxInput = document.getElementById('price-max');
    const resetBtn = document.getElementById('reset-filters');
    const sizeFilterContainer = document.getElementById('size-filter-container');

    function renderCategories() {
        categoriesGrid.innerHTML = categories.map(cat => `
            <div class="category-tile ${cat === activeCategory ? 'active' : ''}" data-category="${cat}">
                ${cat}
            </div>
        `).join('');
        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.addEventListener('click', () => {
                activeCategory = tile.dataset.category;
                renderCategories();
                applyFilters();
            });
        });
    }

    function renderSizeFilters() {
        sizeFilterContainer.innerHTML = allSizes.map(size => `
            <label class="size-checkbox">
                <input type="checkbox" value="${size}" ${selectedSizes.includes(size) ? 'checked' : ''}> ${size}
            </label>
        `).join('');
        document.querySelectorAll('.size-checkbox input').forEach(cb => {
            cb.addEventListener('change', () => {
                selectedSizes = Array.from(document.querySelectorAll('.size-checkbox input:checked')).map(cb => cb.value);
                applyFilters();
            });
        });
    }

    function getFilteredProducts() {
        let filtered = products.filter(p => p.category === activeCategory);
        if (searchQuery.trim() !== '') filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
        filtered = filtered.filter(p => p.price >= minPrice && p.price <= maxPrice);
        if (selectedSizes.length > 0) filtered = filtered.filter(p => p.sizes.some(s => selectedSizes.includes(s)));
        return filtered;
    }

    function renderProducts() {
        const filtered = getFilteredProducts();
        productsGrid.innerHTML = '';
        if (filtered.length === 0) {
            productsGrid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Нет товаров, соответствующих фильтрам</p>';
            return;
        }
        filtered.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-id', product.id);
            card.innerHTML = `
                <img class="product-img" src="${product.images[0]}" alt="${product.name}">
                <div class="product-brand">${product.brand}</div>
                <div class="product-title">${product.name}</div>
                <div class="product-price">${product.priceStr}</div>
                <div class="product-sizes">${product.sizes.join(', ')}</div>
            `;
            card.addEventListener('click', () => openModal(product.id));
            productsGrid.appendChild(card);
        });
    }

    function openModal(id) {
        const p = products.find(p=>p.id===id);
        if(!p) return;
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `<div class="modal-product"><div class="modal-gallery"><img class="modal-main-img" id="modal-main-img" src="${p.images[0]}"><div class="modal-thumbnails">${p.images.map(img=>`<img class="modal-thumb" src="${img}">`).join('')}</div></div><div class="modal-info"><h2>${p.name}</h2><div class="modal-brand">${p.brand}</div><div class="modal-price">${p.priceStr}</div><div class="modal-desc">${p.description}</div><div><strong>Материал:</strong> ${p.material}</div><div><strong>Размеры:</strong> ${p.sizes.join(', ')}</div><div><strong>Уход:</strong> ${p.care}</div><a href="${p.instagramLink}" target="_blank" class="modal-direct">ЗАКАЗАТЬ В INSTAGRAM</a></div></div>`;
        const mainImg = document.getElementById('modal-main-img');
        document.querySelectorAll('.modal-thumb').forEach(thumb => thumb.addEventListener('click', () => mainImg.src = thumb.src));
        document.getElementById('productModal').style.display = 'flex';
    }

    function applyFilters() {
        minPrice = parseInt(priceMinInput.value) || 0;
        maxPrice = parseInt(priceMaxInput.value) || 20000;
        if (maxPrice < minPrice) maxPrice = minPrice;
        searchQuery = searchInput.value;
        renderProducts();
    }

    function resetFilters() {
        searchInput.value = '';
        priceMinInput.value = 0;
        priceMaxInput.value = 20000;
        selectedSizes = [];
        renderSizeFilters();
        searchQuery = '';
        minPrice = 0;
        maxPrice = 20000;
        applyFilters();
    }

    function init() {
        renderCategories();
        renderSizeFilters();
        priceMinInput.value = 0;
        priceMaxInput.value = 20000;
        searchInput.addEventListener('input', applyFilters);
        priceMinInput.addEventListener('input', applyFilters);
        priceMaxInput.addEventListener('input', applyFilters);
        resetBtn.addEventListener('click', resetFilters);
        applyFilters();
    }

    document.querySelector('.close-modal')?.addEventListener('click', () => document.getElementById('productModal').style.display = 'none');
    window.addEventListener('click', e => { if(e.target === document.getElementById('productModal')) document.getElementById('productModal').style.display = 'none'; });
    init();
</script>
</body>
</html>
