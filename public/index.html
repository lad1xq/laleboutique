<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lale Boutique - Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #e5c76b;
            --gold-dark: #b8962e;
            --black: #111111;
            --white: #ffffff;
            --off-white: #fafafa;
            --gray-light: #f5f5f5;
            --gray: #888888;
            --gray-dark: #555555;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
            --shadow-gold: 0 4px 20px rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 400;
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 40px; 
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 18px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            transition: all var(--transition-normal);
        }

        header.scrolled {
            padding: 12px 0;
            box-shadow: var(--shadow-sm);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--gold);
            transition: all var(--transition-normal);
        }

        .logo:hover {
            color: var(--gold-dark);
        }

        .logo-img { 
            height: 40px; 
            width: auto; 
            transition: transform var(--transition-normal);
        }

        .logo:hover .logo-img {
            transform: scale(1.02);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav a {
            text-decoration: none;
            color: var(--black);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            position: relative;
            transition: all var(--transition-normal);
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: all var(--transition-normal);
            transform: translateX(-50%);
        }

        .nav a:hover {
            color: var(--gold);
        }

        .nav a:hover::after {
            width: 60%;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(180deg, var(--off-white) 0%, var(--white) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Lale%20%D0%B2%D0%BE%D0%B4%D0%B7%D0%BD%D0%B0%D0%BA10-yoIXVWz1KqO9gzmq0n8HoKUF90QaE2.png');
            background-repeat: no-repeat;
            background-position: right -100px bottom -50px;
            background-size: 500px;
            opacity: 0.4;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: var(--gold);
            margin-bottom: 24px;
            text-shadow: 0 2px 20px rgba(212, 175, 55, 0.2);
        }

        .hero-logo-img {
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0 4px 20px rgba(212, 175, 55, 0.2));
            transition: transform var(--transition-slow);
        }

        .hero-logo-img:hover {
            transform: scale(1.02);
        }

        .hero-description {
            font-size: 0.85rem;
            font-weight: 400;
            max-width: 500px;
            margin: 0 auto;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 2;
        }

        .hero-divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 30px auto;
            opacity: 0.6;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        .scroll-hint span {
            display: block;
            width: 24px;
            height: 24px;
            border-right: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.6;
            transition: opacity var(--transition-normal);
        }

        .scroll-hint:hover span {
            opacity: 1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* Sections */
        section {
            padding: 100px 0;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.2rem;
            font-weight: 400;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 16px;
            color: var(--black);
        }

        .section-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 60px;
        }

        .section-divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 60px;
        }

        /* Carousel */
        .carousel {
            position: relative;
            overflow: hidden;
            padding: 0 50px;
        }

        .carousel-container {
            display: flex;
            gap: 30px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding: 20px 0;
        }

        .carousel-container::-webkit-scrollbar { display: none; }

        .carousel-item {
            flex: 0 0 300px;
            cursor: pointer;
            transition: all var(--transition-normal);
            text-decoration: none;
            color: var(--black);
            background: var(--white);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .carousel-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .carousel-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: var(--gray-light);
            transition: transform var(--transition-slow);
        }

        .carousel-item:hover .carousel-img {
            transform: scale(1.03);
        }

        .carousel-info {
            text-align: center;
            padding: 20px;
            background: var(--white);
        }

        .carousel-brand {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            font-weight: 500;
        }

        .carousel-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1rem;
            margin: 8px 0;
            font-weight: 500;
        }

        .carousel-price {
            font-size: 0.9rem;
            color: var(--black);
            font-weight: 500;
        }

        .carousel-sizes {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--white);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--gold);
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .carousel-nav:hover {
            background: var(--gold);
            color: var(--white);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .carousel-nav.prev { left: 0; }
        .carousel-nav.next { right: 0; }

        /* Catalog Button */
        .catalog-section {
            background: var(--off-white);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .catalog-section::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -100px;
            width: 300px;
            height: 300px;
            background-image: url('https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Lale%20%D0%B2%D0%BE%D0%B4%D0%B7%D0%BD%D0%B0%D0%BA9-6lfxkyCIW8Lo4HkSb2paC1r8IB9as0.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.08;
            pointer-events: none;
        }

        .catalog-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px 48px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .catalog-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gold);
            transition: all var(--transition-normal);
            z-index: -1;
        }

        .catalog-btn:hover {
            color: var(--white);
            box-shadow: var(--shadow-gold);
        }

        .catalog-btn:hover::before {
            left: 0;
        }

        /* Contacts */
        .contacts-block {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .contacts-block p {
            font-size: 0.9rem;
            color: var(--gray-dark);
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .instagram-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 24px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            transition: all var(--transition-normal);
        }

        .instagram-link:hover {
            background: var(--gold);
            color: var(--white);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .map {
            margin-top: 50px;
            height: 300px;
            background: var(--gray-light);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: box-shadow var(--transition-normal);
        }

        .map:hover {
            box-shadow: var(--shadow-lg);
        }

        .map iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 50px 0;
            background: var(--black);
            color: var(--white);
        }

        .footer-logo {
            margin-bottom: 20px;
        }

        .footer-logo img {
            height: 50px;
            opacity: 0.9;
        }

        .footer-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .modal.show {
            opacity: 1;
        }

        .modal-content {
            background: var(--white);
            max-width: 1100px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            margin: 40px auto;
            position: relative;
            padding: 40px;
            border-radius: 4px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(20px);
            transition: all var(--transition-normal);
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 32px;
            cursor: pointer;
            color: var(--gray);
            transition: all var(--transition-fast);
            line-height: 1;
        }

        .close-modal:hover {
            color: var(--gold);
            transform: rotate(90deg);
        }

        .modal-product {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
        }

        .modal-gallery {
            flex: 1;
            min-width: 300px;
        }

        .modal-main-img {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }

        .modal-thumbnails {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .modal-thumb {
            width: 70px;
            height: 90px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.5;
            border-radius: 4px;
            transition: all var(--transition-fast);
            border: 2px solid transparent;
        }

        .modal-thumb:hover,
        .modal-thumb.active {
            opacity: 1;
            border-color: var(--gold);
        }

        .modal-info {
            flex: 1;
            min-width: 300px;
        }

        .modal-info h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--black);
        }

        .modal-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 20px;
        }

        .modal-price {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 24px 0;
            color: var(--black);
        }

        .modal-desc {
            color: var(--gray-dark);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .modal-details {
            border-top: 1px solid var(--gray-light);
            padding-top: 20px;
            margin-top: 20px;
        }

        .modal-details div {
            margin: 10px 0;
            font-size: 0.85rem;
            color: var(--gray-dark);
        }

        .modal-details strong {
            color: var(--black);
            font-weight: 500;
        }

        .modal-direct {
            display: inline-block;
            background: var(--gold);
            color: var(--white);
            text-decoration: none;
            padding: 14px 36px;
            margin-top: 28px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-gold);
        }

        .modal-direct:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.25);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container { padding: 0 30px; }
            .hero-logo { font-size: 3rem; }
            .hero-logo-img { max-width: 260px; }
            section { padding: 80px 0; }
        }

        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            
            header { padding: 14px 0; }
            
            .header-inner {
                flex-direction: column;
                gap: 12px;
            }

            .nav {
                gap: 4px;
            }

            .nav a {
                padding: 6px 12px;
                font-size: 0.7rem;
            }

            .hero-logo { font-size: 2.2rem; letter-spacing: 4px; }
            .hero-logo-img { max-width: 200px; }
            .hero-description { font-size: 0.75rem; letter-spacing: 2px; }
            .hero::before { 
                background-size: 300px;
                background-position: right -50px bottom -30px;
            }

            .section-title { font-size: 1.6rem; letter-spacing: 2px; }

            .carousel { padding: 0 30px; }
            .carousel-item { flex: 0 0 260px; }
            .carousel-nav { width: 40px; height: 40px; }

            .modal-content { padding: 24px; }
            .modal-product { gap: 30px; }
        }

        @media (max-width: 480px) {
            .hero-logo { font-size: 1.8rem; }
            .hero-logo-img { max-width: 160px; }
            
            .carousel-item { flex: 0 0 220px; }
            
            .catalog-btn { 
                padding: 14px 32px; 
                font-size: 0.75rem; 
            }
        }
    </style>
</head>
<body>
<header id="header">
    <div class="container header-inner">
        <a href="#home" class="logo" id="logo-container">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Lale%20%D0%B2%D0%BE%D0%B4%D0%B7%D0%BD%D0%B0%D0%BA7-qKgvcxzi3W5BvRkuoMn32VNhXPoeO4.png" class="logo-img" alt="Lale Boutique">
        </a>
        <nav class="nav">
            <a href="#home">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="#contacts">Контакты</a>
        </nav>
    </div>
</header>

<main>
    <section id="home" class="hero visible">
        <div class="hero-content">
            <div id="hero-logo">
                <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Lale%20%D0%B2%D0%BE%D0%B4%D0%B7%D0%BD%D0%B0%D0%BA2-0pUkNaW9HzrkIK3cawDLoXKLVo7Zoh.png" class="hero-logo-img" alt="Lale Boutique">
            </div>
            <div class="hero-divider"></div>
            <p class="hero-description">Мультибрендовый шоурум<br>Женская одежда</p>
        </div>
        <div class="scroll-hint" onclick="document.getElementById('new').scrollIntoView({behavior:'smooth'})">
            <span></span>
        </div>
    </section>

    <section id="new">
        <div class="container">
            <h2 class="section-title">Новинки</h2>
            <div class="section-divider"></div>
            <div class="carousel">
                <div class="carousel-container" id="new-items"></div>
                <button class="carousel-nav prev" onclick="scrollCarousel('new-items', -1)" aria-label="Предыдущий">←</button>
                <button class="carousel-nav next" onclick="scrollCarousel('new-items', 1)" aria-label="Следующий">→</button>
            </div>
        </div>
    </section>

    <section>
        <div class="container">
            <h2 class="section-title">Хиты продаж</h2>
            <div class="section-divider"></div>
            <div class="carousel">
                <div class="carousel-container" id="popular-items"></div>
                <button class="carousel-nav prev" onclick="scrollCarousel('popular-items', -1)" aria-label="Предыдущий">←</button>
                <button class="carousel-nav next" onclick="scrollCarousel('popular-items', 1)" aria-label="Следующий">→</button>
            </div>
        </div>
    </section>

    <section class="catalog-section">
        <div class="container" style="text-align:center">
            <h2 class="section-title">Откройте для себя</h2>
            <div class="section-divider"></div>
            <a href="catalog.html" class="catalog-btn">Смотреть каталог</a>
        </div>
    </section>

    <section id="contacts">
        <div class="container">
            <h2 class="section-title">Контакты</h2>
            <div class="section-divider"></div>
            <div class="contacts-block">
                <p>ул. Дзержинского, 8/1, Махачкала</p>
                <p>Ежедневно с 11:00 до 20:00</p>
                <a href="https://www.instagram.com/lale_boutique05" target="_blank" class="instagram-link">
                    @lale_boutique05
                </a>
                <div class="map">
                    <iframe src="https://yandex.ru/map-widget/v1/?oid=92141361734&ol=biz&z=18&pt=47.500405,42.981792,pm2rdm" width="100%" height="300" frameborder="0" allowfullscreen="true"></iframe>
                </div>
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <div class="footer-logo">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Lale%20%D0%B2%D0%BE%D0%B4%D0%B7%D0%BD%D0%B0%D0%BA8-yqmZDSzv6hNaNJnFtHTDSNPEo8q2oK.png" alt="Lale">
        </div>
        <p class="footer-text">© 2025 Lale Boutique. Все права защищены.</p>
    </div>
</footer>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const products = [
        { id:1, name:"Платье с цветочным принтом", brand:"Lale", price:"5 900 ₽", category:"Платья", isNew:true, isPopular:true, sizes:"XS, S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+1"], description:"Элегантное платье-футляр", material:"95% хлопок, 5% эластан", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:2, name:"Платье миди с открытой спиной", brand:"Lale", price:"7 200 ₽", category:"Платья", isNew:true, isPopular:false, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+2"], description:"Платье с открытой спиной", material:"Вискоза 100%", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:3, name:"Шелковое платье макси", brand:"Mila Grace", price:"12 500 ₽", category:"Платья", isNew:false, isPopular:true, sizes:"XS, S, M", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Dress+3"], description:"Шелковое платье макси", material:"Натуральный шелк", care:"Химчистка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:4, name:"Комбинезон с поясом", brand:"Verona", price:"8 900 ₽", category:"Комбинезоны", isNew:true, isPopular:false, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+1"], description:"Стильный комбинезон", material:"Полиэстер 65%, хлопок 35%", care:"Машинная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:5, name:"Льняной комбинезон", brand:"Lale", price:"7 500 ₽", category:"Комбинезоны", isNew:false, isPopular:true, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Jumpsuit+2"], description:"Льняной комбинезон", material:"Лен 100%", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:6, name:"Кожаная юбка-карандаш", brand:"Mila Grace", price:"6 900 ₽", category:"Юбки", isNew:false, isPopular:true, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+1"], description:"Эко-кожа", material:"Полиуретан", care:"Влажная чистка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:7, name:"Плиссированная юбка миди", brand:"Verona", price:"5 500 ₽", category:"Юбки", isNew:true, isPopular:false, sizes:"XS, S, M", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Skirt+2"], description:"Плиссированная юбка", material:"Полиэстер 100%", care:"Деликатная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" },
        { id:8, name:"Шелковая блуза", brand:"Mila Grace", price:"7 800 ₽", category:"Блузы", isNew:false, isPopular:true, sizes:"S, M, L", images:["https://placehold.co/800x1000/f5f5f5/aaa?text=Blouse+1"], description:"Атласная блуза", material:"Полиэстер 100%", care:"Ручная стирка", instagramLink:"https://www.instagram.com/lale_boutique05/" }
    ];

    function renderCarousel(containerId, items) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = items.map(p => `
            <div class="carousel-item" data-id="${p.id}">
                <img class="carousel-img" src="${p.images[0]}" alt="${p.name}">
                <div class="carousel-info">
                    <div class="carousel-brand">${p.brand}</div>
                    <div class="carousel-title">${p.name}</div>
                    <div class="carousel-price">${p.price}</div>
                    <div class="carousel-sizes">${p.sizes}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll(`#${containerId} .carousel-item`).forEach(el => el.addEventListener('click', () => openModal(parseInt(el.dataset.id))));
    }

    function openModal(id) {
        const p = products.find(p=>p.id===id);
        if(!p) return;
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `
            <div class="modal-product">
                <div class="modal-gallery">
                    <img class="modal-main-img" id="modal-main-img" src="${p.images[0]}" alt="${p.name}">
                    <div class="modal-thumbnails">${p.images.map(img=>`<img class="modal-thumb" src="${img}" alt="thumbnail">`).join('')}</div>
                </div>
                <div class="modal-info">
                    <div class="modal-brand">${p.brand}</div>
                    <h2>${p.name}</h2>
                    <div class="modal-price">${p.price}</div>
                    <div class="modal-desc">${p.description}</div>
                    <div class="modal-details">
                        <div><strong>Материал:</strong> ${p.material}</div>
                        <div><strong>Размеры:</strong> ${p.sizes}</div>
                        <div><strong>Уход:</strong> ${p.care}</div>
                    </div>
                    <a href="${p.instagramLink}" target="_blank" class="modal-direct">Заказать в Instagram</a>
                </div>
            </div>
        `;
        const mainImg = document.getElementById('modal-main-img');
        document.querySelectorAll('.modal-thumb').forEach(thumb => thumb.addEventListener('click', () => mainImg.src = thumb.src));
        const modal = document.getElementById('productModal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal() {
        const modal = document.getElementById('productModal');
        modal.classList.remove('show');
        setTimeout(() => modal.style.display = 'none', 300);
    }

    function scrollCarousel(containerId, dir) {
        const c = document.getElementById(containerId);
        if(c) c.scrollLeft += dir * 340;
    }

    document.querySelector('.close-modal')?.addEventListener('click', closeModal);
    window.addEventListener('click', e => { if(e.target === document.getElementById('productModal')) closeModal(); });

    renderCarousel('new-items', products.filter(p=>p.isNew));
    renderCarousel('popular-items', products.filter(p=>p.isPopular));

    // Scroll animations
    const sections = document.querySelectorAll('section');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });
    sections.forEach(section => observer.observe(section));

    // Header scroll effect
    window.addEventListener('scroll', () => {
        const header = document.getElementById('header');
        if (window.scrollY > 50) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    });
</script>
</body>
</html>
